<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>湯娘管理 | 嘿月湯宿後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
</head>
<body class="dashboard-page" data-admin-page="staff">
  <div class="dashboard-content">
    <header class="dashboard-header">
      <div class="admin-shell dashboard-header-inner">
        <a class="dashboard-brand dashboard-brand-link" href="index.html">嘿月湯宿後台</a>
        <div class="dashboard-actions">
          <a class="admin-button admin-button-secondary admin-button-link" href="index.html">返回首頁</a>
          <button class="admin-button admin-button-secondary" data-sign-out type="button">登出</button>
        </div>
      </div>
    </header>

    <main class="admin-shell dashboard-main">
      <section class="settings-panel">
        <div class="admin-section-heading">
          <div>
            <p class="admin-eyebrow">Staff Members</p>
            <h1 class="admin-title">湯娘管理</h1>
            <p class="admin-description">
              登入者：<strong data-admin-name>讀取中</strong>　
              角色：<strong data-admin-role>讀取中</strong>
            </p>
          </div>
          <div class="admin-header-actions">
            <a class="admin-button admin-button-secondary admin-button-link" href="game-cards.html">遊戲卡管理</a>
            <button class="admin-button" data-new-staff type="button" hidden>新增湯娘</button>
          </div>
        </div>

        <p class="permission-message" data-staff-denied hidden>
          此帳號沒有湯娘管理權限。
        </p>
        <p class="auth-message settings-message" data-auth-message data-staff-message role="status" hidden></p>

        <section class="staff-editor" data-staff-editor hidden aria-labelledby="staff-form-title">
          <div class="staff-editor-heading">
            <h2 id="staff-form-title">新增湯娘</h2>
            <button class="text-button" data-cancel-edit type="button">取消</button>
          </div>
          <form class="settings-form" data-staff-form>
            <input name="id" type="hidden">
            <div class="settings-grid">
              <div class="field">
                <label for="staff-name">名稱</label>
                <input id="staff-name" name="name" type="text" required>
              </div>
              <div class="field">
                <label for="staff-subtitle">副標題</label>
                <input id="staff-subtitle" name="subtitle" type="text">
              </div>
              <div class="field">
                <label for="staff-role">職位</label>
                <input id="staff-role" name="role" type="text">
              </div>
              <div class="field">
                <label for="staff-sort-order">排序</label>
                <input id="staff-sort-order" name="sort_order" type="number" step="1" min="0" placeholder="未填時自動加 10">
              </div>
              <div class="field settings-grid-full">
                <label for="staff-quote">湯語</label>
                <textarea id="staff-quote" name="quote" rows="7"></textarea>
              </div>
              <div class="field settings-grid-full">
                <label for="staff-image-url">圖片網址</label>
                <input id="staff-image-url" name="image_url" type="url">
              </div>
              <div class="field settings-grid-full">
                <label for="staff-image-file">上傳圖片</label>
                <input id="staff-image-file" data-image-file type="file" accept=".jpg,.jpeg,.png,.webp,.gif,image/jpeg,image/png,image/webp,image/gif">
                <p class="field-help">圖片會等比例縮放至 600 × 800 以內、轉成 WebP，並使用長期快取；每次更換圖片會建立新網址，因此不會顯示舊圖片。GIF 僅取第一幀。</p>
              </div>
              <div class="field">
                <label class="checkbox-field">
                  <input name="is_visible" type="checkbox" checked>
                  <span>前台顯示</span>
                </label>
              </div>
              <div class="field">
                <label class="checkbox-field">
                  <input name="is_reservable" type="checkbox" checked>
                  <span>開放預約指定</span>
                </label>
              </div>
              <div class="image-preview-panel">
                <img data-image-preview alt="湯娘圖片預覽" hidden>
                <span data-image-empty>尚未選擇圖片</span>
              </div>
            </div>
            <div class="settings-form-actions staff-form-actions">
              <button class="admin-button admin-button-secondary" data-upload-image type="button" disabled>上傳圖片</button>
              <button class="admin-button" type="submit">儲存湯娘</button>
            </div>
          </form>
        </section>

        <section class="staff-list-section" data-staff-list-section hidden>
          <div class="staff-list-heading">
            <h2>目前湯娘</h2>
            <span data-staff-count></span>
          </div>
          <div class="staff-admin-list" data-staff-list></div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-staff.js"></script>
</body>
</html>
