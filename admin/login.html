<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>後台登入 | 嘿月湯宿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
</head>
<body data-admin-page="login">
  <main class="admin-shell login-layout">
    <section class="login-card" aria-labelledby="login-title">
      <p class="admin-eyebrow">HEYOTSUKI YADO</p>
      <h1 class="admin-title" id="login-title">後台登入</h1>
      <p class="admin-description">請使用已建立於 Supabase Auth 的管理帳號登入。</p>

      <p class="auth-message" data-auth-message role="alert" hidden></p>

      <form class="login-form" data-login-form>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">密碼</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="admin-button" type="submit">登入</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
</body>
</html>
