<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>嘿月湯宿後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
</head>
<body class="dashboard-page" data-admin-page="dashboard">
  <div class="dashboard-content">
    <header class="dashboard-header">
      <div class="admin-shell dashboard-header-inner">
        <p class="dashboard-brand">嘿月湯宿後台</p>
        <button class="admin-button admin-button-secondary" data-sign-out type="button">登出</button>
      </div>
    </header>

    <main class="admin-shell dashboard-main">
      <section class="welcome-panel">
        <div>
          <p class="admin-eyebrow">Administration</p>
          <h1 class="admin-title">嘿月湯宿後台</h1>
          <div class="profile-meta">
            <span>登入者：<strong data-admin-name>讀取中</strong></span>
            <span>角色：<strong data-admin-role>讀取中</strong></span>
          </div>
        </div>
      </section>

      <section class="feature-grid" aria-label="後台功能">
        <a class="feature-card feature-card-link" href="settings.html">
          <h2>網站設定管理</h2>
          <p>網站名稱、營業資訊與共用連結管理。</p>
          <span class="status-badge status-badge-active">進入管理</span>
        </a>
        <a class="feature-card feature-card-link" href="staff.html">
          <h2>湯娘管理</h2>
          <p>湯娘資料、顯示狀態與排序管理。</p>
          <span class="status-badge status-badge-active">進入管理</span>
        </a>
        <a class="feature-card feature-card-link" href="menu.html">
          <h2>菜單管理</h2>
          <p>湯宿與喫茶菜單內容管理。</p>
          <span class="status-badge status-badge-active">進入管理</span>
        </a>
        <a class="feature-card feature-card-link" href="reservations.html">
          <h2>預約管理</h2>
          <p>查看預約、更新狀態、管理備註與軟刪除。</p>
          <span class="status-badge status-badge-active">進入管理</span>
        </a>
        <a class="feature-card feature-card-link" href="reservation-form.html">
          <h2>預約表單管理</h2>
          <p>管理開放日期、時段、欄位與選項。</p>
          <span class="status-badge status-badge-active">進入管理</span>
        </a>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
</body>
</html>
