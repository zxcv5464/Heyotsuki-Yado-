<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>點餐管理 | 嘿月湯宿後台</title>
  <link data-order-favicon rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%237f1d1d'/%3E%3Cpath d='M18 17h28v30H18z' fill='%23fffaf5' opacity='.95'/%3E%3Cpath d='M23 23h18M23 31h18M23 39h12' stroke='%237f1d1d' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body" data-admin-page="orders">
  <div class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="admin-eyebrow">HEYOTSUKI YADO</p>
        <h1>點餐管理</h1>
      </div>
      <nav class="admin-header-actions" aria-label="後台操作">
        <a class="admin-button admin-button-secondary admin-button-link" href="index.html">返回首頁</a>
        <button class="admin-button admin-button-secondary" type="button" data-sign-out>登出</button>
      </nav>
    </header>

    <main class="admin-main">
      <section class="admin-panel" data-orders-access hidden>
        <div class="admin-section-heading">
          <div>
            <p class="admin-eyebrow">SHOP ORDERS</p>
            <h2>店別訂單</h2>
          </div>
          <div class="admin-order-toolbar">
            <label class="admin-checkbox">
              <input type="checkbox" data-order-sound-toggle>
              <span>啟用提示音</span>
            </label>
            <span class="admin-sound-status" data-order-sound-status>提示音已關閉</span>
            <button class="admin-button admin-button-secondary" type="button" data-orders-refresh>重新整理</button>
          </div>
        </div>

        <div class="admin-tabs" data-shop-tabs aria-label="選擇店別"></div>

        <button class="admin-new-order-alert" data-new-order-alert type="button" hidden>
          <span data-new-order-alert-text>有新訂單，點擊重新載入。</span>
          <strong>重新載入</strong>
        </button>
        <p class="admin-order-toast" data-order-toast role="status" aria-live="polite" hidden></p>

        <div class="admin-filter-grid">
          <label class="admin-field">
            <span>狀態</span>
            <select data-orders-status>
              <option value="pending">待確認</option>
              <option value="accepted">已接受</option>
              <option value="preparing">準備中</option>
              <option value="served">已送達</option>
              <option value="cancelled">已取消</option>
              <option value="">全部狀態</option>
            </select>
          </label>
          <label class="admin-field">
            <span>搜尋</span>
            <input type="search" data-orders-search placeholder="角色 ID 或聯絡方式">
          </label>
          <label class="admin-checkbox admin-checkbox-filter">
            <input type="checkbox" data-orders-deleted>
            <span>顯示已刪除訂單</span>
          </label>
        </div>

        <div class="admin-message" data-orders-message role="status" aria-live="polite"></div>
        <div class="admin-order-list" data-orders-list></div>
      </section>

      <section class="admin-panel" data-orders-denied hidden>
        <h2>沒有點餐管理權限</h2>
        <p>此帳號尚未被授權查看任何店別的訂單。</p>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-orders.js"></script>
</body>
</html>
