<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>預約管理 | 嘿月湯宿後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
</head>
<body class="dashboard-page" data-admin-page="reservations">
  <div class="dashboard-content">
    <header class="dashboard-header">
      <div class="admin-shell dashboard-header-inner">
        <a class="dashboard-brand dashboard-brand-link" href="index.html">嘿月湯宿後台</a>
        <div class="dashboard-actions">
          <a class="admin-button admin-button-secondary admin-button-link" href="index.html">返回首頁</a>
          <button class="admin-button admin-button-secondary" data-sign-out type="button">登出</button>
        </div>
      </div>
    </header>

    <main class="admin-shell dashboard-main">
      <section class="settings-panel">
        <div class="admin-section-heading">
          <div>
            <p class="admin-eyebrow">Reservations</p>
            <h1 class="admin-title">預約管理</h1>
            <p class="admin-description">
              登入者：<strong data-admin-name>讀取中</strong>　
              角色：<strong data-admin-role>讀取中</strong>
            </p>
          </div>
        </div>

        <p class="auth-message settings-message" data-auth-message data-reservations-message role="status" hidden></p>

        <div data-reservations-workspace hidden>
          <section class="reservation-admin-filters" aria-label="預約篩選">
            <div class="field">
              <label for="reservation-status-filter">狀態</label>
              <select id="reservation-status-filter" data-status-filter>
                <option value="pending">待確認</option>
                <option value="all">全部狀態</option>
                <option value="confirmed">已確認</option>
                <option value="cancelled">已取消</option>
                <option value="completed">已完成</option>
                <option value="no_show">未到場</option>
              </select>
            </div>
            <div class="field">
              <label for="reservation-search">搜尋姓名或聯絡方式</label>
              <input id="reservation-search" data-reservation-search type="search" placeholder="輸入關鍵字">
            </div>
            <div class="field">
              <label for="reservation-sort">日期排序</label>
              <select id="reservation-sort" data-date-sort>
                <option value="asc">日期由近到遠</option>
                <option value="desc">日期由遠到近</option>
              </select>
            </div>
            <label class="checkbox-field reservation-deleted-filter">
              <input data-show-deleted type="checkbox">
              <span>顯示已刪除</span>
            </label>
          </section>

          <div class="staff-list-heading reservation-list-heading">
            <h2>預約紀錄</h2>
            <span data-reservation-count></span>
          </div>
          <div class="reservation-admin-list" data-reservation-list></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-reservations.js"></script>
</body>
</html>
