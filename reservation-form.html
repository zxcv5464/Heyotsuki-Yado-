<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>預約表單管理 | 嘿月湯宿後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&amp;family=Noto+Sans+TC:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
</head>
<body class="dashboard-page" data-admin-page="reservation-form">
  <div class="dashboard-content">
    <header class="dashboard-header">
      <div class="admin-shell dashboard-header-inner">
        <a class="dashboard-brand dashboard-brand-link" href="index.html">嘿月湯宿後台</a>
        <div class="dashboard-actions">
          <a class="admin-button admin-button-secondary admin-button-link" href="index.html">返回首頁</a>
          <button class="admin-button admin-button-secondary" data-sign-out type="button">登出</button>
        </div>
      </div>
    </header>

    <main class="admin-shell dashboard-main">
      <section class="settings-panel">
        <div class="admin-section-heading">
          <div>
            <p class="admin-eyebrow">Reservation Form</p>
            <h1 class="admin-title">預約表單管理</h1>
            <p class="admin-description">
              登入者：<strong data-admin-name>讀取中</strong>　
              角色：<strong data-admin-role>讀取中</strong>
            </p>
          </div>
        </div>

        <p class="permission-message" data-form-readonly hidden>
          此帳號僅能查看預約表單設定，不能修改內容。
        </p>
        <p class="auth-message settings-message" data-auth-message data-form-message role="status" hidden></p>

        <div data-form-workspace hidden>
          <section class="staff-editor">
            <div class="staff-editor-heading">
              <h2>基本設定</h2>
            </div>
            <form class="settings-form" data-settings-form>
              <div class="settings-grid">
                <div class="field settings-grid-full">
                  <label for="reservation-form-title">表單標題</label>
                  <input id="reservation-form-title" name="title" type="text" required>
                </div>
                <div class="field settings-grid-full">
                  <label for="reservation-form-description">表單說明</label>
                  <textarea id="reservation-form-description" name="description" rows="8"></textarea>
                </div>
                <fieldset class="field settings-grid-full weekday-fieldset">
                  <legend>可預約星期</legend>
                  <div class="weekday-grid">
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="0"><span>星期日</span></label>
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="1"><span>星期一</span></label>
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="2"><span>星期二</span></label>
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="3"><span>星期三</span></label>
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="4"><span>星期四</span></label>
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="5"><span>星期五</span></label>
                    <label class="checkbox-field"><input name="allowed_weekdays" type="checkbox" value="6"><span>星期六</span></label>
                  </div>
                </fieldset>
                <div class="field">
                  <label for="min-days-before">至少提前天數</label>
                  <input id="min-days-before" name="min_days_before" type="number" min="0" step="1" required>
                </div>
                <div class="field">
                  <label for="booking-window-days">開放預約天數</label>
                  <input id="booking-window-days" name="booking_window_days" type="number" min="1" step="1" required>
                  <p class="field-help">前台只顯示未來此天數範圍內的可預約日期。</p>
                </div>
                <div class="field">
                  <label class="checkbox-field">
                    <input name="is_active" type="checkbox">
                    <span>開放預約表單</span>
                  </label>
                </div>
              </div>
              <div class="settings-form-actions">
                <button class="admin-button" type="submit">儲存基本設定</button>
              </div>
            </form>
          </section>

          <div class="reservation-template-grid">
            <section class="menu-admin-column">
              <div class="staff-list-heading">
                <h2>預約時段</h2>
                <button class="admin-button admin-button-small" data-new-slot type="button">新增時段</button>
              </div>
              <div class="menu-admin-list" data-slot-list></div>
            </section>
            <section class="menu-admin-column">
              <div class="staff-list-heading">
                <h2>例外日期</h2>
                <button class="admin-button admin-button-small" data-new-override type="button">新增例外日期</button>
              </div>
              <div class="menu-admin-list" data-override-list></div>
            </section>
          </div>

          <section class="staff-editor" data-slot-editor hidden>
            <div class="staff-editor-heading">
              <h2 data-slot-editor-title>新增時段</h2>
              <button class="text-button" data-cancel-slot type="button">取消</button>
            </div>
            <form class="settings-form" data-slot-form>
              <input name="id" type="hidden">
              <div class="settings-grid">
                <div class="field"><label>顯示文字</label><input name="label" type="text" required></div>
                <div class="field"><label>儲存值</label><input name="value" type="text" required placeholder="21:30"></div>
                <div class="field"><label>排序</label><input name="sort_order" type="number" min="0" step="1"></div>
                <div class="field"><label class="checkbox-field"><input name="is_visible" type="checkbox" checked><span>前台顯示</span></label></div>
              </div>
              <div class="settings-form-actions"><button class="admin-button" type="submit">儲存時段</button></div>
            </form>
          </section>

          <section class="staff-editor" data-override-editor hidden>
            <div class="staff-editor-heading">
              <h2 data-override-editor-title>新增例外日期</h2>
              <button class="text-button" data-cancel-override type="button">取消</button>
            </div>
            <form class="settings-form" data-override-form>
              <input name="id" type="hidden">
              <div class="settings-grid">
                <div class="field"><label>日期</label><input name="target_date" type="date" required></div>
                <div class="field">
                  <label>模式</label>
                  <select name="mode"><option value="open">例外開放</option><option value="closed">例外關閉</option></select>
                </div>
                <div class="field settings-grid-full"><label>備註</label><textarea name="note" rows="3"></textarea></div>
              </div>
              <div class="settings-form-actions"><button class="admin-button" type="submit">儲存例外日期</button></div>
            </form>
          </section>

          <section class="staff-editor">
            <div class="staff-list-heading">
              <div>
                <h2>表單欄位</h2>
                <p class="field-help">第一版不刪除欄位；不使用的欄位請設為隱藏。</p>
              </div>
              <button class="admin-button admin-button-small" data-new-field type="button">新增欄位</button>
            </div>
            <div class="menu-admin-list" data-field-list></div>
          </section>

          <section class="staff-editor" data-field-editor hidden>
            <div class="staff-editor-heading">
              <h2 data-field-editor-title>編輯欄位</h2>
              <button class="text-button" data-cancel-field type="button">取消</button>
            </div>
            <form class="settings-form" data-field-form>
              <input name="id" type="hidden">
              <div class="settings-grid">
                <div class="field">
                  <label>欄位識別碼</label>
                  <input name="field_key" type="text" required pattern="[a-z0-9_]+" autocomplete="off" aria-describedby="field-key-help">
                  <small class="field-help" id="field-key-help">只能使用小寫英文、數字與底線；建立後不可修改。</small>
                </div>
                <div class="field">
                  <label>欄位類型</label>
                  <select name="field_type" required>
                    <option value="text">text</option>
                    <option value="textarea">textarea</option>
                    <option value="number">number</option>
                    <option value="radio">radio</option>
                    <option value="select">select</option>
                  </select>
                </div>
                <div class="field settings-grid-full"><label>標題</label><input name="label" type="text" required></div>
                <div class="field settings-grid-full"><label>說明文字</label><textarea name="help_text" rows="3"></textarea></div>
                <div class="field"><label>排序</label><input name="sort_order" type="number" min="0" step="1"></div>
                <div class="field"><label class="checkbox-field"><input name="required" type="checkbox"><span>必填</span></label></div>
                <div class="field"><label class="checkbox-field"><input name="is_visible" type="checkbox"><span>前台顯示</span></label></div>
              </div>
              <div class="settings-form-actions"><button class="admin-button" type="submit">儲存欄位</button></div>
            </form>
          </section>

          <section class="staff-editor" data-option-section hidden>
            <div class="staff-list-heading">
              <div>
                <h2>欄位選項</h2>
                <p class="field-help" data-option-field-label></p>
              </div>
              <button class="admin-button admin-button-small" data-new-option type="button">新增選項</button>
            </div>
            <div class="menu-admin-list" data-option-list></div>
          </section>

          <section class="staff-editor" data-option-editor hidden>
            <div class="staff-editor-heading">
              <h2 data-option-editor-title>新增選項</h2>
              <button class="text-button" data-cancel-option type="button">取消</button>
            </div>
            <form class="settings-form" data-option-form>
              <input name="id" type="hidden">
              <input name="field_id" type="hidden">
              <div class="settings-grid">
                <div class="field"><label>顯示文字</label><input name="label" type="text" required></div>
                <div class="field"><label>儲存值</label><input name="value" type="text" required></div>
                <div class="field"><label>排序</label><input name="sort_order" type="number" min="0" step="1"></div>
                <div class="field"><label class="checkbox-field"><input name="is_visible" type="checkbox" checked><span>前台顯示</span></label></div>
              </div>
              <div class="settings-form-actions"><button class="admin-button" type="submit">儲存選項</button></div>
            </form>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-reservation-form.js"></script>
</body>
</html>
