<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>報表匯出 | 嘿月湯宿後台</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body" data-admin-page="reports">
  <div class="admin-shell">
    <header class="admin-header">
      <div>
        <p class="admin-eyebrow">HEYOTSUKI YADO</p>
        <h1>報表匯出</h1>
      </div>
      <nav class="admin-header-actions" aria-label="後台導覽">
        <a class="admin-button admin-button-secondary admin-button-link" href="index.html">返回首頁</a>
        <button class="admin-button admin-button-secondary" type="button" data-sign-out>登出</button>
      </nav>
    </header>

    <main class="admin-main">
      <section class="admin-panel" data-reports-access hidden>
        <div class="admin-section-heading">
          <div>
            <p class="admin-eyebrow">ORDER SALES REPORT</p>
            <h2>點餐銷售報表</h2>
          </div>
        </div>

        <form class="admin-report-filters" data-report-form>
          <label class="admin-field">
            <span>店別</span>
            <select data-report-shop required></select>
          </label>
          <label class="admin-field">
            <span>起始營業日</span>
            <input type="date" data-report-date-from required>
          </label>
          <label class="admin-field">
            <span>結束營業日</span>
            <input type="date" data-report-date-to required>
          </label>
          <fieldset class="admin-report-statuses">
            <legend>訂單狀態</legend>
            <label class="admin-checkbox"><input type="checkbox" value="pending" data-report-status checked><span>待確認</span></label>
            <label class="admin-checkbox"><input type="checkbox" value="accepted" data-report-status checked><span>已接受</span></label>
            <label class="admin-checkbox"><input type="checkbox" value="preparing" data-report-status checked><span>準備中</span></label>
            <label class="admin-checkbox"><input type="checkbox" value="served" data-report-status checked><span>已送達</span></label>
            <label class="admin-checkbox"><input type="checkbox" value="cancelled" data-report-status><span>已取消</span></label>
          </fieldset>
          <button class="admin-button" type="submit" data-report-submit>產生報表</button>
        </form>

        <div class="admin-message" data-report-message role="status" aria-live="polite"></div>

        <section data-report-result hidden>
          <div class="admin-report-actions">
            <button class="admin-button admin-button-secondary" type="button" data-report-csv>匯出 CSV</button>
            <button class="admin-button admin-button-secondary" type="button" data-report-copy>複製文字摘要</button>
          </div>
          <div class="admin-report-summary" data-report-summary></div>
          <div class="admin-report-warnings" data-report-warnings hidden></div>
          <div class="admin-report-sections" data-report-sections></div>
        </section>
      </section>

      <section class="admin-panel" data-reports-denied hidden>
        <h2>沒有報表權限</h2>
        <p>此帳號沒有任何可查看訂單的店別權限。</p>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/admin-reports.js"></script>
</body>
</html>
